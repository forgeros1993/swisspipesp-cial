# Alembic — configuration. Migrations dans swisspipe/persistence/migrations.
# DATABASE_URL est lu depuis l'environnement par env.py (pas de secret ici).

[alembic]
script_location = swisspipe/persistence/migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url est injecté à l'exécution par env.py depuis DATABASE_URL.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
